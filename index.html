  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta property="og:url" content="https://onepot.dk/">
  <meta property="og:title" content="OnePot – Gratis opskrifter, madplan og indkøbsliste">
  <meta property="og:description" content="OnePot er en gratis app til opskrifter, madplan og indkøbslister. Virker offline, kræver ingen login og gemmer alle data lokalt på din enhed.">

  <meta property="og:image" content="https://onepot.dk/og-image.JPEG">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="OnePot – Gratis opskrifter, madplan og indkøbsliste">

  <!-- ==========================================================================
       Twitter / X Card
       ========================================================================== -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="OnePot – Gratis opskrifter, madplan og indkøbsliste">

    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "OnePot",
    "url": "https://onepot.dk/",
    "description": "Gratis app til opskrifter, madplan og indkøbslister.",
    "applicationCategory": "LifestyleApplication",
    "operatingSystem": "Web",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "DKK"
    }
  }
  </script>

  <!-- ==========================================================================
       Stylesheets
       ========================================================================== -->
  <link rel="stylesheet" href="style.css">

<body>
<div class="wrap" id="homePage">
  <header>
    <div class="htop">
      <div class="brand">ONE&nbsp;P<span class="o">O</span>T</div>
      <button class="gearBtn" id="gearBtn" onclick="openSettings()">⚙</button>
    </div>
    <div class="controls">
      <button class="rand" onclick="randomize()" data-i18n="rand_btn"></button>
    </div>
    <div class="filters" id="filters"></div>
  </header>
  <div class="list" id="list"></div>
  <div class="empty hidden" id="empty" data-i18n="empty_no_results"></div>
</div>

<div class="detail" id="detail">
  <div class="dwrap">
    <div class="dbar">
      <button class="back" onclick="closeDetail()" data-i18n="detail_back_all"></button>
      <button class="dice" onclick="randomize()" data-i18n="detail_new"></button>
    </div>
    <div id="dcontent"></div>
  </div>
</div>

<div class="plan" id="plan">
  <div class="pwrap">
    <div class="pbar">
      <button class="back" id="planBack" onclick="planBack()" data-i18n="plan_back_default"></button>
    </div>
    <div id="pcontent"></div>
  </div>
</div>

<div class="wrap" id="savedPage" style="display:none">
  <header>
    <div class="htop">
      <div class="brand" data-i18n="saved_brand"></div>
      <button class="gearBtn" onclick="openSettings()">⚙</button>
    </div>
    <div class="controls">
      <button class="plan-btn" onclick="openPlan()" data-i18n="plan_btn"></button>
    </div>
  </header>
  <div id="savedList"></div>
</div>

<div class="wrap" id="fridgePage" style="display:none">
  <header>
    <div class="htop">
      <div class="brand" data-i18n="fridge_title" style="font-size:26px"></div>
      <button class="gearBtn" onclick="openSettings()">⚙</button>
    </div>
    <p class="fridge-desc" data-i18n="fridge_desc"></p>
    <div class="seg fridgeSeg">
      <button class="seg-btn on" id="fvIng" onclick="setFridgeView('ing')" data-i18n="fridge_view_ing"></button>
      <button class="seg-btn" id="fvRes" onclick="setFridgeView('res')" data-i18n="fridge_view_res"></button>
    </div>
  </header>
  <div id="fridgeContent"></div>
</div>

<div id="printArea"></div>

<div class="settings-backdrop" id="settingsBackdrop" onclick="if(event.target===this) closeSettings()">
  <div class="settings-modal">
    <button class="settings-x" onclick="closeSettings()">✕</button>
    <div class="settings-title" data-i18n="settings_title"></div>
    <div class="settings-desc" data-i18n-html="settings_desc"></div>
    <div class="settings-row">
      <span class="settings-label" data-i18n="settings_version_label"></span>
      <button class="settings-ver" id="setVerBtn" onclick="forceUpdate(this)">v2.1.2 ✓</button>
    </div>
    <div class="settings-row">
      <span class="settings-label" data-i18n="settings_theme_label"></span>
      <div class="seg">
        <button class="seg-btn" id="segDark" onclick="setTheme('dark')" data-i18n="theme_dark"></button>
        <button class="seg-btn" id="segLight" onclick="setTheme('light')" data-i18n="theme_light"></button>
      </div>
    </div>
    <div class="settings-row">
      <span class="settings-label" data-i18n="settings_lang_label"></span>
      <div class="seg">
        <button class="seg-btn" id="segDa" onclick="setLang('da')">Dansk</button>
        <button class="seg-btn" id="segEn" onclick="setLang('en')">English</button>
      </div>
    </div>
  </div>
</div>

<nav class="nav" id="nav">
  <button id="navHome" class="on" onclick="showPage('home')"><span class="nic">🍝</span><span data-i18n="nav_recipes"></span></button>
  <button id="navFridge" onclick="showPage('fridge')"><span class="nic">♻️</span><span data-i18n="nav_fridge"></span></button>
  <button id="navSaved" onclick="showPage('saved')"><span class="nic">📋</span><span data-i18n="nav_plans"></span></button>
</nav>

<div class="install" id="install">
  <button class="x" onclick="dismissInstall()" data-i18n-aria="install_close_aria">✕</button>
  <div id="installContent"></div>
</div>
<!-- SEO content -->
<section class="seo-content">
  <h1 data-i18n="seo_title">
    OnePot – Gratis opskrifter, madplan og indkøbsliste
  </h1>

  <p data-i18n="seo_description">
    OnePot er en gratis app til opskrifter, madplaner og indkøbslister.
    Virker offline og gemmer dine data lokalt på din enhed.
  </p>
</section>
<script src="i18n.js"></script>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
